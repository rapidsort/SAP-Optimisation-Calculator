<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Optimisation Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>SAP Optimisation Calculator</h1>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="pre-test">Pre-Test Analysis</button>
            <button class="tab-btn" data-tab="post-test">Post-Test Analysis</button>
        </div>

        <div id="pre-test" class="tab-content active">
            <!-- Mode Toggle -->
            <div class="segmented-control">
                <button class="segmented-btn active" data-mode="find-mde">Find MDE</button>
                <button class="segmented-btn" data-mode="find-duration">Find Duration</button>
            </div>

            <div class="form-group">
                <label for="weekly-traffic">Weekly Traffic (Users/Sessions)</label>
                <input type="number" id="weekly-traffic" placeholder="e.g. 5000">
            </div>

            <div class="form-group">
                <label for="weekly-conversions">Weekly Conversions</label>
                <input type="number" id="weekly-conversions" placeholder="e.g. 500">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="variants">Variants</label>
                    <input type="number" id="variants" value="2">
                </div>

                <!-- Duration Input (Visible in Find MDE mode) -->
                <div class="form-group" id="group-duration">
                    <label for="duration">Duration (Days)</label>
                    <input type="number" id="duration" value="30">
                </div>

                <!-- Desired MDE Input (Visible in Find Duration mode) -->
                <div class="form-group hidden" id="group-desired-mde" style="display: none;">
                    <label for="desired-mde">Desired Lift (%)</label>
                    <input type="number" id="desired-mde" placeholder="e.g. 5">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="confidence">Confidence (%)</label>
                    <select id="confidence">
                        <option value="90" selected>90%</option>
                        <option value="95">95%</option>
                        <option value="99">99%</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="power">Power (%)</label>
                    <select id="power">
                        <option value="80" selected>80%</option>
                        <option value="90">90%</option>
                    </select>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label>
                    Test Type
                    <!-- <span class="help-icon"
                        data-tooltip="One-Sided (Growth): Use if you only care if B > A. Requires less traffic.&#10;&#10;Two-Sided (Scientific): Use if you must know if B is different from A (better or worse). Standard for strict control.">?</span> -->
                </label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="pre-test-type" value="one-sided"> One-Sided (Growth)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="pre-test-type" value="two-sided" checked> Two-Sided (Scientific)
                    </label>
                </div>
            </div>

            <button id="calculate-btn" class="primary-btn">Calculate MDE</button>

            <div id="result-area" class="result-area hidden">
                <div class="result-header">
                    <h3>Calculated Results</h3>
                    <button id="copy-btn" class="icon-btn" title="Copy to Clipboard">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                            <path
                                d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z" />
                        </svg>
                    </button>
                </div>
                <div id="output-text" class="formatted-output"></div>
            </div>
        </div>

        <div id="post-test" class="tab-content">
            <!-- Global Visitors Input -->
            <div class="section-label">1. Visitor Data (Global)</div>
            <div class="split-inputs">
                <div class="input-column">
                    <h4>Control (A)</h4>
                    <div class="form-group">
                        <label for="control-visitors">Unique Visitors</label>
                        <input type="number" id="control-visitors" placeholder="0">
                    </div>
                </div>
                <div class="input-column">
                    <h4>Challenger (B)</h4>
                    <div class="form-group">
                        <label for="variant-visitors">Unique Visitors</label>
                        <input type="number" id="variant-visitors" placeholder="0">
                    </div>
                </div>
            </div>

            <!-- Metrics Section -->
            <div class="section-label" style="display:flex; justify-content:space-between; align-items:center;">
                2. Success Metrics
                <button id="add-metric-btn" class="secondary-btn small">+ Add Metric</button>
            </div>

            <div id="metrics-container">
                <!-- Default Metric Row -->
                <div class="metric-row">
                    <div class="metric-header">
                        <input type="text" class="metric-name" placeholder="Metric Name (e.g. Clicks)"
                            value="Primary KPI">
                    </div>
                    <div class="metric-inputs">
                        <div class="form-group">
                            <label>Control Conv.</label>
                            <input type="number" class="control-conv" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Challenger Conv.</label>
                            <input type="number" class="variant-conv" placeholder="0">
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 1;">
                    <label for="post-test-confidence">Confidence (%)</label>
                    <select id="post-test-confidence">
                        <option value="90" selected>90%</option>
                        <option value="95">95%</option>
                        <option value="99">99%</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;"></div>
                <!-- Spacer for alignment -->
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label>
                    Test Type
                    <!-- <span class="help-icon"
                        data-tooltip="One-Sided (Growth): Best for CRO to find winners fast.&#10;&#10;Two-Sided (Scientific): Best for strict academic or high-risk testing where detecting negative impact is equally important.">?</span> -->
                </label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="test-type" value="one-sided"> One-Sided (Growth)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="test-type" value="two-sided" checked> Two-Sided (Scientific)
                    </label>
                </div>
            </div>

            <button id="calculate-post-test-btn" class="primary-btn">Calculate Significance</button>

            <div id="post-test-result-area" class="result-area hidden">
                <div class="result-header">
                    <h3>Analysis Report</h3>
                    <button id="copy-post-test-btn" class="icon-btn" title="Copy Report">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                            <path
                                d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z" />
                        </svg>
                    </button>
                </div>
                <div id="post-test-output" class="formatted-output"></div>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
